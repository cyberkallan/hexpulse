; =============================================================================
; HexPulse — HackCat V3 Board Configuration
; ESP32-WROOM | 16MB Flash | 1.3" OLED | 4 Buttons | 800mAh LiPo
; Part of the HexMind AI Ecosystem by Arjun TM (@cyberkallan)
; =============================================================================

[env:hackcat-v3]
board = esp32dev
board_build.partitions = custom_16Mb.csv
board_build.f_flash = 40000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_src_filter =${env.build_src_filter} +<../boards/hackcat-v3>
build_flags =
	${env.build_flags}
	-Iboards/hackcat-v3
	-DCORE_DEBUG_LEVEL=0

	;Features Enabled
	-DHAS_BTN=1

	;Buttons configuration — 4 tactile push buttons
	-DSEL_BTN=26
	-DUP_BTN=32
	-DDW_BTN=33
	-DESC_BTN=25
	-DBTN_ACT=LOW
	-DBTN_ALIAS='"SEL"'

	;Infrared TX/RX
	-DIR_TX_PINS='{ {"Default", TXLED}, {"G12",12} }'
	-DIR_RX_PINS='{ {"Default", RXLED}, {"G15",15} }'
	-DTXLED=12
	-DRXLED=15
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Radio Frequency — 435MHz module
	-DRF_TX_PINS='{ {"Default",13} }'
	-DRF_RX_PINS='{ {"Default",14} }'

	;NRF24L01 via SPI (VSPI)
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=4
	-DNRF24_SS_PIN=5
	-DNRF24_MOSI_PIN=23
	-DNRF24_SCK_PIN=18
	-DNRF24_MISO_PIN=19

	;Battery ADC — 800mAh LiPo
	-DANALOG_BAT_PIN=34
	-DANALOG_BAT_MULTIPLIER=2.0

	;Display — 1.3" OLED I2C (SSD1306 128x64)
	-DFP=1
	-DFM=1
	-DFG=2

	-DHAS_SCREEN=1
	-DROTATION=0

	;TFT_eSPI Setup for SSD1306 OLED via I2C-to-SPI bridge
	;Note: Using U8g2 for actual OLED rendering
	-DUSER_SETUP_LOADED=1
	-DSSD1306_DRIVER=1
	-DTFT_WIDTH=128
	-DTFT_HEIGHT=64
	-DTFT_BACKLIGHT_ON=0
	-DTOUCH_CS=-1
	-DSMOOTH_FONT=1

	;SD Card Setup — SPI
	-DSDCARD_CS=27
	-DSDCARD_SCK=14
	-DSDCARD_MISO=2
	-DSDCARD_MOSI=15

	;Default I2C port (OLED)
	-DGROVE_SDA=21
	-DGROVE_SCL=22

	;SPI pins (shared VSPI for NRF24)
	-DSPI_SCK_PIN=18
	-DSPI_MOSI_PIN=23
	-DSPI_MISO_PIN=19
	-DSPI_SS_PIN=5

	;Status LED
	-DSTATUS_LED=2

	;Device name
	-DDEVICE_NAME='"HackCat V3 | HexPulse"'

	;Performance flags
	-Os
	-DCONFIG_ASYNC_TCP_STACK_SIZE=4096
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1

upload_speed = 921600

lib_deps =
	${env.lib_deps}
