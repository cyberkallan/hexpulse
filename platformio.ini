; =============================================================================
; HexPulse Firmware — PlatformIO Configuration
; Portable Intelligence Platform for HackCat V3
; Part of the HexMind AI Ecosystem
;
; Creator: Arjun TM (@cyberkallan / @imarjunarz)
; =============================================================================

[platformio]
default_envs = hackcat-v3
boards_dir = boards
build_cache_dir = .pio/buildcache
cache_dir = .pio/cache

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, send_on_enter, colorize
board_build.filesystem = littlefs

build_flags =
    -DHEXPULSE_VERSION='"1.0.0"'
    -DHEXPULSE_CODENAME='"Neon Genesis"'
    -DHEXPULSE_CREATOR='"Arjun TM"'
    -DHEXPULSE_GITHUB='"cyberkallan"'
    -DEEPROMSIZE=512
    -Os
    -Wl,--print-memory-usage
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_STACK_SIZE=4096
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=0

lib_deps =
    olikraus/U8g2@^2.35.19
    bblanchon/ArduinoJson@^7.4.2
    nrf24/RF24@^1.4.11
    crankyoldgit/IRremoteESP8266@^2.8.6
    sui77/rc-switch@^2.6.4
    h2zero/NimBLE-Arduino@^2.3.9
    paulstoffregen/Time@^1.6.1
    ESP32Async/ESPAsyncWebServer@^3.9.6
    mikalhart/TinyGPSPlus@^1.1.0

extra_scripts =
    pre:scripts/pre_build.py

; =============================================================================
; HackCat V3 — Primary Target (ESP32-WROOM, 16MB Flash)
; =============================================================================
[env:hackcat-v3]
platform = espressif32@^6.9.0
board = esp32dev
board_build.partitions = partitions_16mb_ota.csv
board_upload.flash_size = 16MB
board_build.flash_mode = dio

build_flags =
    ${env.build_flags}
    -Iboards/hackcat-v3
    -DBOARD_HACKCAT_V3=1
    -DBOARD_NAME='"HackCat V3"'
    ; OLED I2C Display (SSD1306/SH1106 128x64)
    -DOLED_SDA=21
    -DOLED_SCL=22
    -DOLED_WIDTH=128
    -DOLED_HEIGHT=64
    -DOLED_ADDR=0x3C
    ; Navigation Buttons (Active LOW, internal pullup)
    -DBTN_UP=32
    -DBTN_DOWN=33
    -DBTN_LEFT=25
    -DBTN_RIGHT=26
    -DBTN_ACTIVE_LOW=1
    ; NRF24L01 (VSPI)
    -DNRF24_CE=4
    -DNRF24_CS=5
    -DNRF24_SCK=18
    -DNRF24_MISO=19
    -DNRF24_MOSI=23
    ; RF 433/435MHz
    -DRF433_TX=13
    -DRF433_RX=14
    ; IR TX/RX
    -DIR_TX_PIN=12
    -DIR_RX_PIN=15
    ; SD Card (HSPI)
    -DSD_CS=27
    -DSD_SCK=14
    -DSD_MISO=2
    -DSD_MOSI=15
    ; Battery ADC
    -DBAT_ADC_PIN=34
    -DBAT_ADC_DIVIDER=2.0
    ; Status LED
    -DSTATUS_LED_PIN=2
    -DLED_ON=HIGH
    -DLED_OFF=LOW
    ; Flash size
    -DFLASH_SIZE_MB=16

upload_speed = 921600

; =============================================================================
; HackCat V3 — OTA Upload Profile
; =============================================================================
[env:hackcat-v3-ota]
extends = env:hackcat-v3
upload_protocol = espota
upload_port = hexpulse.local
upload_flags = --auth=hexpulse
